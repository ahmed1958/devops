version: "3.9"

services:
  loadtest:
    build: ./seed-data
    depends_on:
      - vote
  vote:
    build: ./vote
    ports:
      - "8080:80"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: ./worker
    depends_on:
      redis:
        condition: service_healthy

      db:
        condition: service_healthy

  result:
    build: ./result
    ports:
      - "8081:4000"
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:latest
    volumes:
      - ./healthchecks/redis.sh:/redis.sh
    healthcheck:
      test: ["CMD", "/redis.sh"]
      interval: 5s
      timeout: 3s
      retries: 5
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./healthchecks/postgres.sh:/postgres.sh
    healthcheck:
      test: ["CMD", "/postgres.sh"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data: