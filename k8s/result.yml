apiVersion: v1
kind: Service
metadata:
  name: result
spec:
  type: NodePort
  selector:
    app: result
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30008
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: result
  labels:
    app: result
spec:
  replicas: 3
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - name: result
        image: sekovv/result:latest
        readinessProbe:
           httpGet:
            path: /
            port: 4000
           initialDelaySeconds: 5
           periodSeconds: 5
        ports:
        - containerPort: 4000